<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-tech">

<div class="navbar">
<img src="https://images.unsplash.com/photo-1526378722484-bd91ca387e72?w=100" class="logo">

<span onclick="showSection('about')">Tentang Kami</span>
<span onclick="showSection('market')">Marketplace</span>
<span onclick="goJual()">Jual Produk</span>

<button class="logout" onclick="logout()">Logout</button>
</div>

<!-- ABOUT -->
<div id="about" class="section">
<h2>Tentang Kami</h2>

<img src="https://smadharmawanitapare.sch.id/images/layanan/1768189416_e6c544f22ab21b74a700.jpeg">
<img src="https://smadharmawanitapare.sch.id/images/berita/1765544811_6eb5073339c396d2bfa8.jpeg">

<p>Kami adalah platform digital modern untuk jual beli produk digital.</p>
<p>Tujuan kami mempermudah transaksi digital secara cepat dan aman.</p>
<p>Target kami pelajar, freelancer, dan pebisnis digital.</p>
</div>

<!-- MARKET -->
<div id="market" class="section" style="display:none;">
<h2>Marketplace</h2>

<div class="products" id="productList"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<h3 id="productName"></h3>
<p id="price"></p>
<button onclick="beli()">Beli</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
